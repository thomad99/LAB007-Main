# NOTE: Render “free” web services use an EPHEMERAL filesystem. Anything written under the app
# directory (including data/ggppi-tasks.json) can disappear on restart or redeploy.
# Persistence options for GGPPI Tracker:
#   (A) GitHub: set GITHUB_TOKEN (repo scope) + GGPPI_GITHUB_ENABLED=true, optional GGPPI_GITHUB_REPO,
#       GGPPI_GITHUB_BRANCH, GGPPI_GITHUB_PATH (default data/ggppi-tasks.json). Tasks commit to the repo.
#   (B) Disk: mount e.g. /var/data/lab007 then set GGPPI_* paths under that mount.
#       If the service was not created from this blueprint, add the same env vars in the Render dashboard.
services:
  - type: web
    name: lab007-unified-services
    env: node
    buildCommand: git submodule update --init --recursive && npm install --no-optional
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: lab007-unified-services
          property: port
      - key: GGPPI_DATA_DIR
        value: /var/data/lab007/GGPPI
      - key: GGPPI_UPLOAD_DIR
        value: /var/data/lab007/GGPPI/uploads
