<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CursorAI — Projects</title>
  <meta name="description" content="View and manage CursorAI generated projects" />
  <link rel="icon" type="image/png" href="/images/lab007 Icon.PNG" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #111;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }
    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }
    .top h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .top a {
      color: #0a58ca;
      text-decoration: none;
      font-weight: 600;
    }
    .top a:hover { text-decoration: underline; }
    .panel {
      border: 1px solid #e7e7e7;
      border-radius: 14px;
      padding: 16px;
      background: #fff;
    }
    .status { min-height: 1.2rem; color: #555; font-size: 0.95rem; margin-bottom: 12px; }
    .status.err { color: #b91c1c; font-weight: 600; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    th {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      font-weight: 700;
    }
    .muted { color: #666; font-size: 0.85rem; max-width: 280px; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.82rem; word-break: break-all; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .btn {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn.secondary {
      background: #fff;
      color: #111;
      border-color: #ccc;
    }
    .btn.danger {
      background: #fff;
      color: #b91c1c;
      border-color: #fca5a5;
    }
    .btn.danger:hover {
      background: #fef2f2;
    }
    .empty {
      padding: 24px;
      text-align: center;
      color: #666;
    }
    @media (max-width: 720px) {
      table { font-size: 0.82rem; }
      .muted { max-width: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>CursorAI projects</h1>
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
        <a href="/cursorai">← New project</a>
        <a href="/">LAB007 home</a>
      </div>
    </div>

    <section class="panel">
      <p id="statusText" class="status">Loading projects…</p>
      <div id="tableWrap"></div>
    </section>
  </main>

  <script>
    (function () {
      var statusEl = document.getElementById('statusText');
      var tableWrap = document.getElementById('tableWrap');

      function formatBytes(n) {
        if (n == null || !isFinite(n)) return '—';
        if (n < 1024) return n + ' B';
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
        return (n / (1024 * 1024)).toFixed(2) + ' MB';
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function fmtDate(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleString();
        } catch (e) {
          return String(iso);
        }
      }

      function renderRows(projects) {
        if (!projects.length) {
          tableWrap.innerHTML =
            '<div class="empty">No projects yet. <a href="/cursorai">Create one</a>.</div>';
          return;
        }
        var rows = projects
          .map(function (p) {
            var safeFolder = encodeURIComponent(p.folderName);
            return (
              '<tr>' +
              '<td><strong>' +
              escapeHtml(p.projectName || p.folderName) +
              '</strong><div class="mono muted" style="margin-top:4px;">' +
              escapeHtml(p.folderName) +
              '</div></td>' +
              '<td class="muted">' +
              fmtDate(p.createdAt) +
              '</td>' +
              '<td>' +
              formatBytes(p.bytes) +
              '</td>' +
              '<td><div class="actions">' +
              '<a class="btn secondary" href="/cursorai?edit=' +
              safeFolder +
              '">Edit</a>' +
              '<a class="btn secondary" href="' +
              escapeHtml(p.previewUrl) +
              '" target="_blank" rel="noopener">View</a>' +
              '<button type="button" class="btn danger" data-delete="' +
              safeFolder +
              '">Delete</button>' +
              '</div></td>' +
              '</tr>'
            );
          })
          .join('');
        tableWrap.innerHTML =
          '<table><thead><tr>' +
          '<th>Project</th><th>Created</th><th>Size on disk</th><th>Actions</th>' +
          '</tr></thead><tbody>' +
          rows +
          '</tbody></table>';
        tableWrap.querySelectorAll('[data-delete]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var folder = btn.getAttribute('data-delete');
            if (
              !confirm(
                'Delete this project folder from disk? This cannot be undone.'
              )
            )
              return;
            btn.disabled = true;
            fetch('/api/cursorai/projects/' + folder, { method: 'DELETE' })
              .then(function (r) {
                return r.json().then(function (j) {
                  if (!r.ok) throw new Error(j.error || 'Delete failed');
                  return j;
                });
              })
              .then(function () {
                return load();
              })
              .catch(function (err) {
                statusEl.className = 'status err';
                statusEl.textContent = err.message || 'Delete failed.';
                btn.disabled = false;
              });
          });
        });
      }

      function load() {
        statusEl.className = 'status';
        statusEl.textContent = 'Loading…';
        return fetch('/api/cursorai/projects')
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.error || 'Failed to load');
              return j;
            });
          })
          .then(function (data) {
            var list = data.projects || [];
            statusEl.textContent =
              list.length === 0
                ? 'No saved projects.'
                : list.length + ' project(s) on disk.';
            renderRows(list);
          })
          .catch(function (err) {
            statusEl.className = 'status err';
            statusEl.textContent = err.message || 'Could not load projects.';
            tableWrap.innerHTML = '';
          });
      }

      load();
    })();
  </script>
</body>
</html>
