<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <title>007Trade · SIMPLE TRADE</title>
  <link rel="icon" type="image/png" href="/images/lab007 Icon.PNG" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0b; color: #e8e8ea; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 18px 48px; }
    .top { display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:22px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand img { height:44px; width:auto; }
    .brand h1 { margin:0; font-size:1.45rem; font-weight:700; letter-spacing:0.02em; }
    a { color: #c9a227; font-weight: 600; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }
    .tabs a {
      color:#d4c07a; text-decoration:none; font-weight:700; font-size:0.82rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.2; letter-spacing: 0;
      border:1px solid #4a4124; border-radius:999px; padding:8px 12px; background:#131316;
    }
    .tabs a.active { background:#c9a227; color:#111; border-color:#c9a227; }
    .tabs a:hover { border-color:#c9a227; }
    .panel { border: 1px solid #2a2a2f; border-radius: 14px; background: #121214; padding: 18px; margin-bottom: 16px; }
    .page-title { margin: 0 0 8px; font-size: 1.2rem; }
    .sub { color: #8b8b93; font-size: 0.9rem; line-height: 1.5; margin: 0 0 14px; }
    input, select, button { font: inherit; border-radius: 10px; border: 1px solid #3a3a44; background: #0e0e10; color: #e8e8ea; padding: 10px 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .primary { background: #c9a227; color: #111; border-color: #c9a227; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img src="/images/LAB007-GOLD-TRANS.png" alt="LAB007" />
        <h1>007Trade Dashboard</h1>
      </div>
      <div class="tabs">
        <a href="/007trade">Dashboard</a>
        <a href="/007trade/simple-trade" class="active">SIMPLE TRADE</a>
        <a href="/007trade/auto-trade">AUTO-TRADE</a>
        <a href="/007trade/circuit-breaker">Circuit Breaker</a>
        <a href="/007trade/market-conditions">Market Conditions</a>
        <a href="/007trade/copytrader">CopyTrader</a>
        <a href="/007trade/reports">Reports</a>
        <a href="/007trade/logs">Logs</a>
        <a href="/007trade/settings">Settings</a>
        <a href="/">Home</a>
      </div>
    </div>
    <h2 class="page-title">SIMPLE TRADE</h2>
    <p class="sub">Quick buy/sell only. Use <a href="/007trade/auto-trade">AUTO-TRADE</a> for strategy workflows and automation rules.</p>

    <div class="panel">
      <div class="row" style="margin-bottom:10px;">
        <input type="text" id="symbol" placeholder="Symbol" style="width:110px" />
        <input type="number" id="qty" min="1" value="1" style="width:90px" />
        <select id="side">
          <option value="buy">Buy</option>
          <option value="sell">Sell</option>
        </select>
        <button id="submitBtn" class="primary" type="button">Submit</button>
      </div>
      <label class="sub" style="display:flex;gap:8px;align-items:center;cursor:pointer;margin:0">
        <input type="checkbox" id="plainOnly" /> Plain market only (no bracket legs)
      </label>
      <p id="msg" class="sub" style="margin-top:12px;"></p>
    </div>
  </div>
  <script>
    (function () {
      var state = {};
      function el(id) { return document.getElementById(id); }
      function loadState() {
        return fetch('/api/007trade/state').then(function (r) { return r.json(); }).then(function (d) {
          state = d || {};
          el('submitBtn').disabled = !state.alpacaEnvPresent;
          if (!state.alpacaEnvPresent) {
            el('msg').textContent = 'Alpaca keys not configured. Open Settings first.';
          }
        });
      }
      el('submitBtn').addEventListener('click', function () {
        el('msg').textContent = '';
        var body = {
          symbol: el('symbol').value,
          qty: el('qty').value,
          side: el('side').value,
          plainOnly: el('plainOnly').checked === true
        };
        fetch('/api/007trade/alpaca-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
          .then(function (r) { return r.json().then(function (j) { return { r: r, j: j }; }); })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || 'Order failed');
            el('msg').textContent = 'Order submitted: ' + ((x.j.order && x.j.order.id) || 'ok');
          })
          .catch(function (e) {
            el('msg').textContent = e.message || 'Error';
          });
      });
      loadState();
    })();
  </script>
</body>
</html>
