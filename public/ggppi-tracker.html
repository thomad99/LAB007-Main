<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGPPI Tracker | LAB007</title>
  <meta name="description" content="Simple team task table with auto-save.">
  <link rel="icon" type="image/png" href="/images/lab007 Icon.PNG">
  <style>
    :root {
      --bg: #0f1320;
      --panel: #171e31;
      --line: #2f3c5f;
      --text: #edf2ff;
      --muted: #a8b3cf;
      --accent: #68adff;
      --cell-bg: #11182a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      background: radial-gradient(circle at top right, #20335e 0%, #0f1320 45%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: rgba(23, 30, 49, 0.96);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 4vw, 1.95rem);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: var(--panel);
    }

    thead th {
      text-align: left;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #1d2640;
    }

    tbody td {
      border-bottom: 1px solid #2b3656;
      padding: 6px;
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid #38456c;
      border-radius: 8px;
      background: var(--cell-bg);
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.92rem;
    }

    input[type="number"] {
      width: 90px;
    }

    .done-cell {
      text-align: center;
      width: 130px;
    }

    .draft-row input {
      border-style: dashed;
      border-color: #4d639d;
      background: #121c31;
    }

    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      padding-top: 8px;
    }

    .status {
      min-height: 1.2rem;
      font-size: 0.88rem;
      color: var(--muted);
      padding-top: 6px;
    }

    .status.error { color: #ff9fa2; }
    .status.success { color: #8ce4ba; }

    @media (max-width: 760px) {
      body { padding: 9px; }
      .panel { padding: 10px; }
      input[type="text"], input[type="number"] {
        padding: 8px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <label class="toggle">
          <input id="showCompleted" type="checkbox">
          Show completed tasks
        </label>
      </div>
      <h1>GGPPI Tracker</h1>
      <p class="sub">Simple task table with auto-save. Fill the blank row to create a new task.</p>
    </section>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Task Name</th>
              <th style="width:120px;">Task Progress</th>
              <th style="width:220px;">Assigned Name</th>
              <th style="width:130px;">Completed</th>
            </tr>
          </thead>
          <tbody id="taskRows"></tbody>
        </table>
      </div>
      <div class="hint">Auto-save runs when you leave a cell or toggle completed.</div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    (function () {
      const apiBase = '/api/ggppi/tasks';
      const statusEl = document.getElementById('status');
      const taskRows = document.getElementById('taskRows');
      const showCompleted = document.getElementById('showCompleted');

      const state = {
        tasks: [],
        draft: { taskName: '', progress: 0, assignedTo: '', completed: false },
        savingDraft: false
      };

      function setStatus(message, type) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function clampProgress(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return 0;
        return Math.max(0, Math.min(100, Math.round(n)));
      }

      function sortByCreatedAsc(tasks) {
        return tasks.slice().sort(function (a, b) {
          const aTime = new Date(a.createdAt || 0).getTime();
          const bTime = new Date(b.createdAt || 0).getTime();
          return aTime - bTime;
        });
      }

      function visibleTasks() {
        const sorted = sortByCreatedAsc(state.tasks);
        if (showCompleted.checked) return sorted;
        return sorted.filter(function (task) { return !task.completed; });
      }

      function render() {
        const rows = visibleTasks().map(function (task) {
          const progress = clampProgress(task.progress);
          return (
            '<tr data-task-id="' + esc(task.id) + '">' +
              '<td><input type="text" data-field="taskName" value="' + esc(task.taskName) + '"></td>' +
              '<td><input type="number" min="0" max="100" data-field="progress" value="' + progress + '"></td>' +
              '<td><input type="text" data-field="assignedTo" value="' + esc(task.assignedTo) + '"></td>' +
              '<td class="done-cell"><input type="checkbox" data-field="completed" ' + (task.completed ? 'checked' : '') + '></td>' +
            '</tr>'
          );
        }).join('');

        const draft = state.draft;
        const draftRow = (
          '<tr class="draft-row" data-task-id="draft">' +
            '<td><input type="text" data-field="taskName" value="' + esc(draft.taskName) + '" placeholder="Type new task..."></td>' +
            '<td><input type="number" min="0" max="100" data-field="progress" value="' + clampProgress(draft.progress) + '"></td>' +
            '<td><input type="text" data-field="assignedTo" value="' + esc(draft.assignedTo) + '" placeholder="Assigned name"></td>' +
            '<td class="done-cell"><input type="checkbox" data-field="completed" ' + (draft.completed ? 'checked' : '') + '></td>' +
          '</tr>'
        );

        taskRows.innerHTML = rows + draftRow;
      }

      async function loadTasks() {
        setStatus('Loading tasks...');
        try {
          const res = await fetch(apiBase);
          if (!res.ok) throw new Error('Failed to load tasks');
          const data = await res.json();
          state.tasks = Array.isArray(data.tasks) ? data.tasks : [];
          render();
          setStatus('Ready', 'success');
        } catch (error) {
          state.tasks = [];
          render();
          setStatus('Could not load tasks.', 'error');
        }
      }

      async function createTaskFromDraftIfReady() {
        if (state.savingDraft) return;
        const taskName = state.draft.taskName.trim();
        const assignedTo = state.draft.assignedTo.trim();
        if (!taskName || !assignedTo) return;

        state.savingDraft = true;
        setStatus('Saving new task...');
        try {
          const res = await fetch(apiBase, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              taskName: taskName,
              assignedTo: assignedTo,
              progress: state.draft.completed ? 100 : clampProgress(state.draft.progress),
              completed: !!state.draft.completed
            })
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to save new task');

          state.tasks.push(data.task);
          state.draft = { taskName: '', progress: 0, assignedTo: '', completed: false };
          render();
          setStatus('Task added.', 'success');
        } catch (error) {
          setStatus(error.message || 'Could not save new task.', 'error');
        } finally {
          state.savingDraft = false;
        }
      }

      function getTaskById(taskId) {
        return state.tasks.find(function (task) { return task.id === taskId; });
      }

      async function saveExistingTask(taskId) {
        const task = getTaskById(taskId);
        if (!task) return;
        setStatus('Saving changes...');
        try {
          const res = await fetch(apiBase + '/' + encodeURIComponent(taskId), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              taskName: task.taskName,
              assignedTo: task.assignedTo,
              progress: task.completed ? 100 : clampProgress(task.progress),
              completed: !!task.completed
            })
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to save task');
          const index = state.tasks.findIndex(function (item) { return item.id === taskId; });
          if (index >= 0) state.tasks[index] = data.task;
          render();
          setStatus('Saved.', 'success');
        } catch (error) {
          setStatus(error.message || 'Could not save task.', 'error');
        }
      }

      taskRows.addEventListener('input', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        const field = target.getAttribute('data-field');
        if (!taskId || !field) return;

        const value = field === 'completed' ? !!target.checked : target.value;
        if (taskId === 'draft') {
          if (field === 'progress') state.draft.progress = clampProgress(value);
          else if (field === 'completed') state.draft.completed = !!value;
          else state.draft[field] = value;
          return;
        }

        const task = getTaskById(taskId);
        if (!task) return;
        if (field === 'progress') task.progress = clampProgress(value);
        else if (field === 'completed') task.completed = !!value;
        else task[field] = value;
      });

      taskRows.addEventListener('change', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        if (!taskId) return;

        if (taskId === 'draft') {
          createTaskFromDraftIfReady();
        } else {
          saveExistingTask(taskId);
        }
      });

      taskRows.addEventListener('focusout', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        if (!taskId) return;

        if (taskId === 'draft') {
          createTaskFromDraftIfReady();
        } else {
          saveExistingTask(taskId);
        }
      });

      showCompleted.addEventListener('change', function () {
        render();
      });

      render();
      loadTasks();
    })();
  </script>
</body>
</html>
