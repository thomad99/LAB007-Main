<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGPPI Tracker | LAB007</title>
  <meta name="description" content="GGPPI task tracker for mobile team workflows.">
  <link rel="icon" type="image/png" href="/images/lab007 Icon.PNG">
  <style>
    :root {
      --bg: #0f1320;
      --panel: #171e31;
      --line: #2f3c5f;
      --text: #edf2ff;
      --muted: #a8b3cf;
      --accent: #68adff;
      --danger: #ffb4c4;
      --danger-bg: #2a1720;
      --ok: #8ce4ba;
      --input: #11182a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 10px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 0px));
      padding-left: max(10px, env(safe-area-inset-left, 0px));
      padding-right: max(10px, env(safe-area-inset-right, 0px));
      background: radial-gradient(circle at top right, #20335e 0%, #0f1320 45%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: rgba(23, 30, 49, 0.96);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 5vw, 2rem);
    }

    .header-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      width: 100%;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    label {
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
    }

    select,
    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid #3a4b78;
      border-radius: 10px;
      background: var(--input);
      color: var(--text);
      padding: 12px;
      font-size: 16px;
      min-height: 44px;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
    }

    .icon-btn,
    .btn {
      border: 1px solid #3e5285;
      background: #1b2a46;
      color: #d7e8ff;
      border-radius: 10px;
      height: 44px;
      min-width: 44px;
      padding: 0 14px;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .icon-btn {
      width: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      line-height: 1;
    }

    .btn.primary {
      background: linear-gradient(180deg, #6eb3ff, #4e95e4);
      color: #081527;
      border-color: #79b9ff;
    }

    .btn.danger {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: #5d3342;
    }

    .status {
      min-height: 1.2rem;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .status.error { color: #ff9fa2; }
    .status.success { color: var(--ok); }

    .add-panel {
      display: none;
      margin-top: 8px;
      border: 1px dashed #4f6299;
      border-radius: 12px;
      padding: 10px;
      background: rgba(17, 24, 42, 0.55);
      gap: 10px;
    }

    .add-panel.open {
      display: grid;
    }

    .task-list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .task-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(17, 24, 42, 0.55);
    }

    .task-head {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }

    .task-title {
      font-size: 1rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-meta {
      color: var(--muted);
      font-size: 0.83rem;
      white-space: nowrap;
    }

    .task-body {
      display: none;
      border-top: 1px solid #2d3a5e;
      padding: 10px;
      gap: 10px;
    }

    .task-item.expanded .task-body {
      display: grid;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed #445786;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    @media (min-width: 760px) {
      .task-body-grid {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="header-row">
        <h1>GGPPI Tracker</h1>
      </div>

      <div class="toolbar">
        <div class="field">
          <label for="ownerFilter">Team Member View</label>
          <select id="ownerFilter"></select>
        </div>

        <button id="addToggleBtn" class="icon-btn" type="button" aria-label="Add task" title="Add task">+</button>
      </div>

      <div id="addPanel" class="add-panel">
        <div class="field">
          <label for="newTaskName">Task Name</label>
          <input id="newTaskName" type="text" placeholder="Enter task name">
        </div>

        <div class="field">
          <label for="newTaskNotes">Notes</label>
          <textarea id="newTaskNotes" placeholder="Add notes"></textarea>
        </div>

        <div class="field">
          <label for="newTaskOwner">Assigned To</label>
          <select id="newTaskOwner"></select>
        </div>

        <label class="toggle">
          <input id="newTaskCompleted" type="checkbox">
          Completed
        </label>

        <div class="task-actions">
          <button id="saveNewTaskBtn" class="btn primary" type="button">Save</button>
          <button id="cancelNewTaskBtn" class="btn" type="button">Cancel</button>
        </div>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section class="panel">
      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <script>
    (function () {
      const apiBase = '/api/ggppi/tasks';
      const ownerPrefKey = 'ggppi-selected-owner-v1';
      const fallbackOwners = ['David T', 'John G', 'Tom', 'Dave 3D', 'TBC'];

      const statusEl = document.getElementById('status');
      const taskListEl = document.getElementById('taskList');
      const ownerFilterEl = document.getElementById('ownerFilter');

      const addToggleBtn = document.getElementById('addToggleBtn');
      const addPanel = document.getElementById('addPanel');
      const newTaskNameEl = document.getElementById('newTaskName');
      const newTaskNotesEl = document.getElementById('newTaskNotes');
      const newTaskOwnerEl = document.getElementById('newTaskOwner');
      const newTaskCompletedEl = document.getElementById('newTaskCompleted');
      const saveNewTaskBtn = document.getElementById('saveNewTaskBtn');
      const cancelNewTaskBtn = document.getElementById('cancelNewTaskBtn');

      const state = {
        tasks: [],
        owners: fallbackOwners.slice(),
        selectedOwner: '',
        expandedIds: new Set()
      };

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setStatus(message, type) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      function normalizeOwner(name) {
        const raw = String(name || '').trim();
        if (!raw) return '';
        const lower = raw.toLowerCase();
        if (lower === 'david thomas' || lower === 'david t' || lower === 'david t.') return 'David T';
        if (lower === 'jon') return 'John G';
        const exact = state.owners.find((owner) => owner.toLowerCase() === lower);
        return exact || '';
      }

      function sortTasks(tasks) {
        return tasks.slice().sort(function (a, b) {
          const byOwner = String(a.assignedTo || '').localeCompare(String(b.assignedTo || ''));
          if (byOwner !== 0) return byOwner;
          return new Date(a.createdAt || 0).getTime() - new Date(b.createdAt || 0).getTime();
        });
      }

      function filteredTasks() {
        const selected = state.selectedOwner;
        const byOwner = selected === '__all__'
          ? state.tasks
          : state.tasks.filter((task) => normalizeOwner(task.assignedTo) === selected);
        return sortTasks(byOwner);
      }

      function renderOwnerOptions() {
        const current = state.selectedOwner;
        const owners = state.owners.slice();

        ownerFilterEl.innerHTML = '<option value="__all__">All team members</option>' + owners
          .map((owner) => '<option value="' + esc(owner) + '">' + esc(owner) + '</option>')
          .join('');

        newTaskOwnerEl.innerHTML = owners
          .map((owner) => '<option value="' + esc(owner) + '">' + esc(owner) + '</option>')
          .join('');

        const normalizedCurrent = current && current !== '__all__' ? normalizeOwner(current) : current;
        ownerFilterEl.value = normalizedCurrent && owners.includes(normalizedCurrent) ? normalizedCurrent : '__all__';
        state.selectedOwner = ownerFilterEl.value;

        const defaultOwner = ownerFilterEl.value !== '__all__' ? ownerFilterEl.value : owners[0];
        if (owners.includes(defaultOwner)) {
          newTaskOwnerEl.value = defaultOwner;
        }
      }

      function openAddPanel(open) {
        addPanel.classList.toggle('open', !!open);
        if (open) {
          newTaskNameEl.focus();
        }
      }

      function renderTasks() {
        const tasks = filteredTasks();
        if (!tasks.length) {
          taskListEl.innerHTML = '<div class="empty">No tasks for this view yet.</div>';
          return;
        }

        taskListEl.innerHTML = tasks.map(function (task) {
          const isExpanded = state.expandedIds.has(task.id);
          const titleText = String(task.taskName || 'Untitled task');
          const safeTitleDisplay = esc(titleText);
          const safeTaskNameValue = esc(titleText);
          const notesText = String(task.notes || '');
          const safeNotesValue = esc(notesText);
          const ownerOptions = state.owners.map(function (owner) {
            const selected = normalizeOwner(task.assignedTo) === owner ? ' selected' : '';
            return '<option value="' + esc(owner) + '"' + selected + '>' + esc(owner) + '</option>';
          }).join('');

          return (
            '<article class="task-item' + (isExpanded ? ' expanded' : '') + '" data-task-id="' + esc(task.id) + '">' +
              '<button class="task-head" type="button" data-action="toggle-expand">' +
                '<span class="task-title">' + safeTitleDisplay + '</span>' +
                '<span class="task-meta">' + esc(normalizeOwner(task.assignedTo) || 'TBC') + (task.completed ? ' - Done' : '') + '</span>' +
              '</button>' +
              '<div class="task-body">' +
                '<div class="task-body-grid">' +
                  '<div class="field">' +
                    '<label>Task Name</label>' +
                    '<input type="text" data-field="taskName" value="' + safeTaskNameValue + '">' +
                  '</div>' +
                  '<div class="field">' +
                    '<label>Assigned To</label>' +
                    '<select data-field="assignedTo">' + ownerOptions + '</select>' +
                  '</div>' +
                '</div>' +
                '<div class="field">' +
                  '<label>Notes</label>' +
                  '<textarea data-field="notes" placeholder="Add notes">' + safeNotesValue + '</textarea>' +
                '</div>' +
                '<label class="toggle"><input type="checkbox" data-field="completed"' + (task.completed ? ' checked' : '') + '> Completed</label>' +
                '<div class="task-actions">' +
                  '<button type="button" class="btn primary" data-action="save">Save</button>' +
                  '<button type="button" class="btn danger" data-action="delete">Delete</button>' +
                '</div>' +
              '</div>' +
            '</article>'
          );
        }).join('');
      }

      function readTaskForm(taskId) {
        const card = taskListEl.querySelector('[data-task-id="' + taskId + '"]');
        if (!card) return null;
        return {
          taskName: String((card.querySelector('[data-field="taskName"]') || {}).value || '').trim(),
          assignedTo: String((card.querySelector('[data-field="assignedTo"]') || {}).value || '').trim(),
          notes: String((card.querySelector('[data-field="notes"]') || {}).value || '').trim(),
          completed: !!((card.querySelector('[data-field="completed"]') || {}).checked)
        };
      }

      async function loadTasks() {
        setStatus('Loading tasks...');
        try {
          const res = await fetch(apiBase);
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to load tasks');

          const ownersFromApi = Array.isArray(data.owners) && data.owners.length ? data.owners : fallbackOwners;
          state.owners = ownersFromApi.slice();

          state.tasks = (Array.isArray(data.tasks) ? data.tasks : []).map(function (task) {
            const owner = normalizeOwner(task.assignedTo) || 'TBC';
            return Object.assign({}, task, { assignedTo: owner });
          });

          const remembered = localStorage.getItem(ownerPrefKey) || '';
          state.selectedOwner = (remembered && (remembered === '__all__' || state.owners.includes(remembered)))
            ? remembered
            : (state.owners[0] || '__all__');

          renderOwnerOptions();
          renderTasks();
          setStatus('Ready', 'success');
        } catch (error) {
          state.tasks = [];
          renderOwnerOptions();
          renderTasks();
          setStatus(error.message || 'Could not load tasks from the server.', 'error');
        }
      }

      async function createTask() {
        const taskName = String(newTaskNameEl.value || '').trim();
        const assignedTo = normalizeOwner(newTaskOwnerEl.value);
        const notes = String(newTaskNotesEl.value || '').trim();
        const completed = !!newTaskCompletedEl.checked;

        if (!taskName) {
          setStatus('Task name is required.', 'error');
          newTaskNameEl.focus();
          return;
        }
        if (!assignedTo) {
          setStatus('Please select an owner from the list.', 'error');
          newTaskOwnerEl.focus();
          return;
        }

        setStatus('Saving task...');
        try {
          const res = await fetch(apiBase, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taskName: taskName, assignedTo: assignedTo, notes: notes, completed: completed })
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to create task');

          newTaskNameEl.value = '';
          newTaskNotesEl.value = '';
          newTaskCompletedEl.checked = false;
          openAddPanel(false);

          await loadTasks();
          setStatus('Task created.', 'success');
        } catch (error) {
          setStatus(error.message || 'Could not save task.', 'error');
        }
      }

      async function saveTask(taskId) {
        const payload = readTaskForm(taskId);
        if (!payload) return;

        payload.assignedTo = normalizeOwner(payload.assignedTo);
        if (!payload.taskName) {
          setStatus('Task name cannot be empty.', 'error');
          return;
        }
        if (!payload.assignedTo) {
          setStatus('Assigned owner must be from the owner list.', 'error');
          return;
        }

        setStatus('Saving changes...');
        try {
          const res = await fetch(apiBase + '/' + encodeURIComponent(taskId), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to save task');

          const index = state.tasks.findIndex(function (task) { return task.id === taskId; });
          if (index >= 0) {
            state.tasks[index] = Object.assign({}, data.task, { assignedTo: normalizeOwner(data.task.assignedTo) || 'TBC' });
          }
          renderTasks();
          setStatus('Saved.', 'success');
        } catch (error) {
          setStatus(error.message || 'Could not save task.', 'error');
        }
      }

      async function deleteTask(taskId) {
        const ok = window.confirm('Delete this task?');
        if (!ok) return;

        setStatus('Deleting task...');
        try {
          const res = await fetch(apiBase + '/' + encodeURIComponent(taskId), { method: 'DELETE' });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to delete task');

          state.tasks = state.tasks.filter(function (task) { return task.id !== taskId; });
          state.expandedIds.delete(taskId);
          renderTasks();
          setStatus('Deleted.', 'success');
        } catch (error) {
          setStatus(error.message || 'Could not delete task.', 'error');
        }
      }

      addToggleBtn.addEventListener('click', function () {
        openAddPanel(!addPanel.classList.contains('open'));
      });

      cancelNewTaskBtn.addEventListener('click', function () {
        openAddPanel(false);
      });

      saveNewTaskBtn.addEventListener('click', function () {
        createTask();
      });

      ownerFilterEl.addEventListener('change', function () {
        state.selectedOwner = ownerFilterEl.value;
        localStorage.setItem(ownerPrefKey, state.selectedOwner);
        if (state.selectedOwner !== '__all__') {
          newTaskOwnerEl.value = state.selectedOwner;
        }
        renderTasks();
      });

      taskListEl.addEventListener('change', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.getAttribute('data-field') !== 'assignedTo') return;
        const card = target.closest('.task-item');
        if (!card) return;
        const taskId = card.getAttribute('data-task-id');
        if (!taskId) return;
        saveTask(taskId);
      });

      taskListEl.addEventListener('click', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        const card = target.closest('.task-item');
        if (!card) return;
        const taskId = card.getAttribute('data-task-id');
        if (!taskId) return;

        const actionEl = target.closest('[data-action]');
        if (!actionEl) return;
        const action = actionEl.getAttribute('data-action');

        if (action === 'toggle-expand') {
          if (state.expandedIds.has(taskId)) state.expandedIds.delete(taskId);
          else state.expandedIds.add(taskId);
          renderTasks();
        } else if (action === 'save') {
          saveTask(taskId);
        } else if (action === 'delete') {
          deleteTask(taskId);
        }
      });

      loadTasks();
    })();
  </script>
</body>
</html>
