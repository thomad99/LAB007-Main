<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGPPI Tracker | LAB007</title>
  <meta name="description" content="Simple team task table with auto-save.">
  <link rel="icon" type="image/png" href="/images/lab007 Icon.PNG">
  <style>
    :root {
      --bg: #0f1320;
      --panel: #171e31;
      --line: #2f3c5f;
      --text: #edf2ff;
      --muted: #a8b3cf;
      --accent: #68adff;
      --cell-bg: #11182a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      background: radial-gradient(circle at top right, #20335e 0%, #0f1320 45%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: rgba(23, 30, 49, 0.96);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 4vw, 1.95rem);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .filters label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }

    .filters select {
      width: 100%;
      border: 1px solid #38456c;
      border-radius: 10px;
      background: #0f1522;
      color: var(--text);
      padding: 10px 11px;
      font-size: 0.95rem;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: var(--panel);
    }

    thead th {
      text-align: left;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #1d2640;
    }

    tbody td {
      border-bottom: 1px solid #2b3656;
      padding: 6px;
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #38456c;
      border-radius: 8px;
      background: var(--cell-bg);
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.92rem;
    }

    .done-cell {
      text-align: center;
      width: 130px;
    }

    .action-cell {
      text-align: center;
      width: 56px;
      vertical-align: middle;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid #4a3a45;
      background: #24141a;
      color: #ffc9d4;
      cursor: pointer;
      padding: 0;
    }

    .icon-btn:hover {
      border-color: #7a4a5a;
      background: #2c1820;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .draft-row input {
      border-style: dashed;
      border-color: #4d639d;
      background: #121c31;
    }

    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      padding-top: 8px;
    }

    .status {
      min-height: 1.2rem;
      font-size: 0.88rem;
      color: var(--muted);
      padding-top: 6px;
    }

    .status.error { color: #ff9fa2; }
    .status.success { color: #8ce4ba; }

    @media (max-width: 760px) {
      body { padding: 9px; }
      .panel { padding: 10px; }
      input[type="text"] {
        padding: 8px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <label class="toggle">
          <input id="showCompleted" type="checkbox">
          Show completed tasks
        </label>
      </div>
      <h1>GGPPI Tracker</h1>
    </section>

    <section class="panel">
      <div class="filters">
        <div>
          <label for="assignedFilter">Assigned</label>
          <select id="assignedFilter">
            <option value="">All team members</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Task Name</th>
              <th style="width:260px;">Notes</th>
              <th style="width:220px;">Assigned Name</th>
              <th style="width:130px;">Completed</th>
              <th class="action-cell" aria-label="Delete"></th>
            </tr>
          </thead>
          <tbody id="taskRows"></tbody>
        </table>
      </div>
      <datalist id="assignedSuggestions"></datalist>
      <div class="hint">Auto-save runs when you leave a cell or toggle completed.</div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    (function () {
      const apiBase = '/api/ggppi/tasks';
      const localKey = 'ggppi-tracker-local-tasks-v1';
      const defaultAssignedNames = ['David T', 'Jon', 'Tom', 'Dave 3D'];
      const statusEl = document.getElementById('status');
      const taskRows = document.getElementById('taskRows');
      const showCompleted = document.getElementById('showCompleted');
      const assignedFilter = document.getElementById('assignedFilter');
      const assignedSuggestions = document.getElementById('assignedSuggestions');

      const trashIconSvg = (
        '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">' +
          '<path fill="currentColor" d="M9 3h6a1 1 0 0 1 1 1v1h4v2H4V5h4V4a1 1 0 0 1 1-1zm-1 6h2v9H8zm4 0h2v9h-2zm4 0h2v9h-2z"/>' +
        '</svg>'
      );

      const state = {
        tasks: [],
        draft: { taskName: '', notes: '', assignedTo: '', completed: false },
        savingDraft: false,
        localMode: false
      };

      function setStatus(message, type) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function loadLocalTasks() {
        try {
          const raw = localStorage.getItem(localKey);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function saveLocalTasks() {
        try {
          localStorage.setItem(localKey, JSON.stringify(state.tasks));
        } catch (error) {
          // Ignore localStorage write errors.
        }
      }

      function sortByAssignedAsc(tasks) {
        return tasks.slice().sort(function (a, b) {
          const aName = String(a.assignedTo || '').trim().toLocaleLowerCase();
          const bName = String(b.assignedTo || '').trim().toLocaleLowerCase();
          const nameCmp = aName.localeCompare(bName);
          if (nameCmp !== 0) return nameCmp;
          const aTime = new Date(a.createdAt || 0).getTime();
          const bTime = new Date(b.createdAt || 0).getTime();
          return aTime - bTime;
        });
      }

      function renderAssignedSuggestions() {
        const taskNames = state.tasks.map(function (task) {
          return String(task.assignedTo || '').trim();
        }).filter(Boolean);
        const draftName = String(state.draft.assignedTo || '').trim();
        const combined = defaultAssignedNames.concat(taskNames, draftName ? [draftName] : []);
        const unique = Array.from(new Set(combined));
        assignedSuggestions.innerHTML = unique.map(function (name) {
          return '<option value="' + esc(name) + '"></option>';
        }).join('');
      }

      function syncAssignedFilterOptions() {
        const current = assignedFilter.value;
        const taskNames = state.tasks.map(function (task) {
          return String(task.assignedTo || '').trim();
        }).filter(Boolean);
        const draftName = String(state.draft.assignedTo || '').trim();
        const combined = defaultAssignedNames.concat(taskNames, draftName ? [draftName] : []);
        const unique = Array.from(new Set(combined)).sort(function (a, b) {
          return a.localeCompare(b);
        });

        assignedFilter.innerHTML = '<option value="">All team members</option>' +
          unique.map(function (name) {
            return '<option value="' + esc(name) + '">' + esc(name) + '</option>';
          }).join('');

        if (unique.includes(current)) {
          assignedFilter.value = current;
        }
      }

      function visibleTasks() {
        const filteredByAssignee = assignedFilter.value
          ? state.tasks.filter(function (task) {
              return String(task.assignedTo || '').trim() === assignedFilter.value;
            })
          : state.tasks.slice();

        const sorted = sortByAssignedAsc(filteredByAssignee);
        if (showCompleted.checked) return sorted;
        return sorted.filter(function (task) { return !task.completed; });
      }

      function render() {
        const rows = visibleTasks().map(function (task) {
          return (
            '<tr data-task-id="' + esc(task.id) + '">' +
              '<td><input type="text" data-field="taskName" value="' + esc(task.taskName) + '"></td>' +
              '<td><input type="text" data-field="notes" value="' + esc(task.notes || '') + '" placeholder="Add note"></td>' +
              '<td><input type="text" list="assignedSuggestions" data-field="assignedTo" value="' + esc(task.assignedTo) + '"></td>' +
              '<td class="done-cell"><input type="checkbox" data-field="completed" ' + (task.completed ? 'checked' : '') + '></td>' +
              '<td class="action-cell">' +
                '<button type="button" class="icon-btn" data-action="delete" aria-label="Delete task">' + trashIconSvg + '</button>' +
              '</td>' +
            '</tr>'
          );
        }).join('');

        const draft = state.draft;
        const draftRow = (
          '<tr class="draft-row" data-task-id="draft">' +
            '<td><input type="text" data-field="taskName" value="' + esc(draft.taskName) + '" placeholder="Type new task..."></td>' +
            '<td><input type="text" data-field="notes" value="' + esc(draft.notes || '') + '" placeholder="Add note"></td>' +
            '<td><input type="text" list="assignedSuggestions" data-field="assignedTo" value="' + esc(draft.assignedTo) + '" placeholder="Assigned name"></td>' +
            '<td class="done-cell"><input type="checkbox" data-field="completed" ' + (draft.completed ? 'checked' : '') + '></td>' +
            '<td class="action-cell"></td>' +
          '</tr>'
        );

        taskRows.innerHTML = rows + draftRow;
        renderAssignedSuggestions();
        syncAssignedFilterOptions();
      }

      async function loadTasks() {
        setStatus('Loading tasks...');
        try {
          const res = await fetch(apiBase);
          if (!res.ok) throw new Error('Failed to load tasks');
          const data = await res.json();
          state.tasks = Array.isArray(data.tasks) ? data.tasks : [];
          state.localMode = false;
          render();
          setStatus('Ready', 'success');
        } catch (error) {
          state.localMode = true;
          state.tasks = loadLocalTasks();
          render();
          setStatus('Ready', 'success');
        }
      }

      async function createTaskFromDraftIfReady() {
        if (state.savingDraft) return;
        const taskName = state.draft.taskName.trim();
        const assignedTo = state.draft.assignedTo.trim();
        if (!taskName || !assignedTo) return;

        state.savingDraft = true;
        setStatus('Saving new task...');
        try {
          if (state.localMode) {
            const now = new Date().toISOString();
            state.tasks.push({
              id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
              taskName: taskName,
              assignedTo: assignedTo,
              notes: String(state.draft.notes || '').trim(),
              completed: !!state.draft.completed,
              createdAt: now,
              updatedAt: now
            });
            saveLocalTasks();
            state.draft = { taskName: '', notes: '', assignedTo: '', completed: false };
            render();
            setStatus('Task added.', 'success');
            return;
          }

          const res = await fetch(apiBase, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              taskName: taskName,
              assignedTo: assignedTo,
              notes: String(state.draft.notes || '').trim(),
              completed: !!state.draft.completed
            })
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to save new task');

          state.tasks.push(data.task);
          state.draft = { taskName: '', notes: '', assignedTo: '', completed: false };
          render();
          setStatus('Task added.', 'success');
        } catch (error) {
          state.localMode = true;
          const now = new Date().toISOString();
          state.tasks.push({
            id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
            taskName: taskName,
            assignedTo: assignedTo,
            notes: String(state.draft.notes || '').trim(),
            completed: !!state.draft.completed,
            createdAt: now,
            updatedAt: now
          });
          saveLocalTasks();
          state.draft = { taskName: '', notes: '', assignedTo: '', completed: false };
          render();
          setStatus('Task added.', 'success');
        } finally {
          state.savingDraft = false;
        }
      }

      function getTaskById(taskId) {
        return state.tasks.find(function (task) { return task.id === taskId; });
      }

      async function saveExistingTask(taskId) {
        const task = getTaskById(taskId);
        if (!task) return;
        setStatus('Saving changes...');
        try {
          if (state.localMode) {
            task.updatedAt = new Date().toISOString();
            saveLocalTasks();
            render();
            setStatus('Saved.', 'success');
            return;
          }

          const res = await fetch(apiBase + '/' + encodeURIComponent(taskId), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              taskName: task.taskName,
              assignedTo: task.assignedTo,
              notes: String(task.notes || '').trim(),
              completed: !!task.completed
            })
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to save task');
          const index = state.tasks.findIndex(function (item) { return item.id === taskId; });
          if (index >= 0) state.tasks[index] = data.task;
          render();
          setStatus('Saved.', 'success');
        } catch (error) {
          state.localMode = true;
          task.updatedAt = new Date().toISOString();
          saveLocalTasks();
          render();
          setStatus('Saved.', 'success');
        }
      }

      async function deleteTask(taskId) {
        if (!taskId || taskId === 'draft') return;
        const ok = window.confirm('Delete this task?');
        if (!ok) return;

        setStatus('Deleting task...');
        try {
          if (state.localMode) {
            state.tasks = state.tasks.filter(function (task) { return task.id !== taskId; });
            saveLocalTasks();
            render();
            setStatus('Deleted.', 'success');
            return;
          }

          const res = await fetch(apiBase + '/' + encodeURIComponent(taskId), { method: 'DELETE' });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Failed to delete task');

          state.tasks = state.tasks.filter(function (task) { return task.id !== taskId; });
          render();
          setStatus('Deleted.', 'success');
        } catch (error) {
          state.localMode = true;
          state.tasks = state.tasks.filter(function (task) { return task.id !== taskId; });
          saveLocalTasks();
          render();
          setStatus('Deleted.', 'success');
        }
      }

      taskRows.addEventListener('input', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        const field = target.getAttribute('data-field');
        if (!taskId || !field) return;

        const value = field === 'completed' ? !!target.checked : target.value;
        if (taskId === 'draft') {
          if (field === 'completed') state.draft.completed = !!value;
          else state.draft[field] = value;
          return;
        }

        const task = getTaskById(taskId);
        if (!task) return;
        if (field === 'completed') task.completed = !!value;
        else task[field] = value;
      });

      taskRows.addEventListener('change', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        if (!taskId) return;

        if (taskId === 'draft') {
          createTaskFromDraftIfReady();
        } else {
          saveExistingTask(taskId);
        }
      });

      taskRows.addEventListener('focusout', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        if (!taskId) return;

        if (taskId === 'draft') {
          createTaskFromDraftIfReady();
        } else {
          saveExistingTask(taskId);
        }
      });

      taskRows.addEventListener('click', function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const btn = target.closest('button[data-action="delete"]');
        if (!btn) return;
        const row = btn.closest('tr');
        if (!row) return;
        const taskId = row.getAttribute('data-task-id');
        deleteTask(taskId);
      });

      showCompleted.addEventListener('change', function () {
        render();
      });

      assignedFilter.addEventListener('change', function () {
        render();
      });

      render();
      loadTasks();
    })();
  </script>
</body>
</html>
