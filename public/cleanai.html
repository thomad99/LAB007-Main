<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>LAB007 CLEANAI</title>
  <meta name="description" content="LAB007 CLEANAI — room scan for cleaning issues" />
  <link rel="icon" type="image/png" href="/images/lab007 Icon.PNG" />
  <link rel="shortcut icon" type="image/png" href="/images/lab007 Icon.PNG" />
  <link rel="apple-touch-icon" href="/images/lab007 Icon.PNG" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f4f5;
      color: #111;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    .shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100%;
      overflow: hidden;
    }
    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }
    .topbar img {
      width: 36px;
      height: auto;
      display: block;
    }
    .topbar h1 {
      margin: 0;
      font-size: clamp(1rem, 4vw, 1.25rem);
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .view-panel {
      flex: 1 1 auto;
      min-height: 0;
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stage-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      min-height: 0;
    }
    /* Wraps scaled canvas so overlay percentages match pixels */
    .preview-frame {
      position: relative;
      display: block;
      max-width: 100%;
      max-height: 100%;
      line-height: 0;
    }
    video {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }
    canvas#liveView {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .preview-frame .overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .tag {
      position: absolute;
      border: 2px solid rgba(251, 191, 36, 0.95);
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    .tag span {
      position: absolute;
      left: 0;
      bottom: 100%;
      margin-bottom: 4px;
      max-width: min(240px, 82vw);
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.25;
      color: #fff;
      background: rgba(17, 17, 17, 0.88);
      border-radius: 6px;
      white-space: normal;
      word-break: break-word;
    }
    .tag.tag-low span {
      top: 100%;
      bottom: auto;
      margin-top: 4px;
      margin-bottom: 0;
    }
    .control-panel {
      flex: 0 0 auto;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-big {
      min-height: 52px;
      border-radius: 12px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-start {
      background: #111;
      color: #fff;
    }
    .btn-stop {
      background: #fecaca;
      color: #7f1d1d;
    }
    .btn-big:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }
    #statusBar {
      margin-top: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: #444;
      min-height: 1.35rem;
      line-height: 1.35;
    }
    details.panel-more {
      margin-top: 10px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 0.82rem;
    }
    details.panel-more > summary {
      list-style: none;
      cursor: pointer;
      font-weight: 600;
      padding: 12px 0;
      padding-right: 8px;
    }
    details.panel-more > summary::-webkit-details-marker { display: none; }
    details.panel-more > summary::after {
      content: "▸";
      float: right;
      opacity: 0.5;
    }
    details.panel-more[open] > summary::after { transform: rotate(90deg); display: inline-block; }
    .panel-body {
      padding-bottom: 12px;
      border-top: 1px solid #f0f0f0;
    }
    .panel-body label { display: block; font-size: 0.72rem; color: #64748b; margin-bottom: 4px; }
    .panel-body select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 10px 12px;
      font: inherit;
      margin-bottom: 10px;
      background: #fff;
    }
    .panel-body a {
      color: #0066cc;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      margin-top: 4px;
    }
    .panel-body .fine {
      margin: 0;
      margin-top: 10px;
      font-size: 0.69rem;
      color: #888;
      line-height: 1.45;
    }
    @media (min-height: 700px) {
      .panel-body select { padding: 11px 12px; }
    }
    @media (min-width: 600px) {
      .shell { max-width: 480px; margin: 0 auto; border-left: 1px solid #e5e5e5; border-right: 1px solid #e5e5e5; }
      body { background: #e8e8ea; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <img src="/images/LAB007-GOLD-TRANS.PNG" alt="" decoding="async" style="width:36px;height:auto" />
      <h1>CLEANAI</h1>
    </header>

    <section class="view-panel" aria-label="Camera preview">
      <div class="stage" id="stage">
        <div class="stage-inner" id="stageInner">
          <video id="cam" playsinline muted></video>
          <div class="preview-frame">
            <canvas id="liveView"></canvas>
            <div class="overlay" id="overlay" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </section>

    <footer class="control-panel">
      <div class="btn-row">
        <button type="button" class="btn-big btn-start" id="btnStart">Start recording</button>
        <button type="button" class="btn-big btn-stop" id="btnStop" disabled>Stop recording</button>
      </div>
      <div id="statusBar" aria-live="polite"></div>

      <details class="panel-more">
        <summary>Options &amp; info</summary>
        <div class="panel-body">
          <label for="provider">Vision API</label>
          <select id="provider" aria-label="Vision provider">
            <option value="auto">Auto (try OpenAI, then Claude)</option>
            <option value="openai">OpenAI</option>
            <option value="claude">Claude</option>
          </select>
          <a href="/cleanai/dashboard">Dashboard &amp; checklist</a>
          <p class="fine">
            ~1 snapshot per second while recording; labels show on preview. Issues (not photos) are saved on disk until you stop, then your session report opens. AI guesses only—verify before chemicals or repairs.
          </p>
        </div>
      </details>
    </footer>
  </div>

  <script>
    (function () {
      var cam = document.getElementById('cam');
      var liveView = document.getElementById('liveView');
      var overlay = document.getElementById('overlay');
      var btnStart = document.getElementById('btnStart');
      var btnStop = document.getElementById('btnStop');
      var statusBar = document.getElementById('statusBar');
      var providerSel = document.getElementById('provider');

      var stream = null;
      var timer = null;
      var busy = false;
      var sessionId = null;
      var maxLongEdge = 1280;

      function setStatus(text) {
        statusBar.textContent = text || '';
      }

      function clearOverlay() {
        overlay.innerHTML = '';
      }

      function renderIssues(issues) {
        clearOverlay();
        if (!issues || !issues.length) return;
        for (var i = 0; i < issues.length; i++) {
          var it = issues[i];
          var bx = Math.max(0, Math.min(1, Number(it.x)));
          var by = Math.max(0, Math.min(1, Number(it.y)));
          var bw = Math.max(0, Math.min(1 - bx, Number(it.w)));
          var bh = Math.max(0, Math.min(1 - by, Number(it.h)));
          var tag = document.createElement('div');
          tag.className = 'tag' + (by < 0.14 ? ' tag-low' : '');
          tag.style.left = bx * 100 + '%';
          tag.style.top = by * 100 + '%';
          tag.style.width = bw * 100 + '%';
          tag.style.height = bh * 100 + '%';
          var lab = document.createElement('span');
          lab.textContent = it.label || it.type || 'Issue';
          tag.appendChild(lab);
          overlay.appendChild(tag);
        }
      }

      function sizeCanvasFromVideo(ctx) {
        var vw = cam.videoWidth;
        var vh = cam.videoHeight;
        if (!vw || !vh) return false;
        var scale = 1;
        if (Math.max(vw, vh) > maxLongEdge) {
          scale = maxLongEdge / Math.max(vw, vh);
        }
        var cw = Math.round(vw * scale);
        var ch = Math.round(vh * scale);
        if (liveView.width !== cw) liveView.width = cw;
        if (liveView.height !== ch) liveView.height = ch;
        ctx.drawImage(cam, 0, 0, cw, ch);
        return true;
      }

      function captureAndAnalyze() {
        if (!stream || busy || !sessionId) return;
        if (cam.readyState < cam.HAVE_METADATA) return;
        var ctx = liveView.getContext('2d');
        if (!sizeCanvasFromVideo(ctx)) return;
        busy = true;
        var dataUrl = liveView.toDataURL('image/jpeg', 0.72);
        fetch('/api/cleanai/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            image: dataUrl,
            provider: providerSel.value,
            sessionId: sessionId
          })
        })
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.error || 'Request failed');
              return j;
            });
          })
          .then(function (data) {
            var issues = data.issues || [];
            setStatus(issues.length ? issues.length + ' issue(s) — last frame' : 'Clean — last frame');
            renderIssues(issues);
          })
          .catch(function (err) {
            setStatus(err.message || 'Analysis error');
          })
          .finally(function () {
            busy = false;
          });
      }

      async function start() {
        setStatus('');
        clearOverlay();
        btnStart.disabled = true;
        providerSel.disabled = true;
        try {
          var startRes = await fetch('/api/cleanai/sessions/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider: providerSel.value })
          });
          var startJson = await startRes.json().catch(function () {
            return {};
          });
          if (!startRes.ok) throw new Error(startJson.error || 'Could not start logging session');
          sessionId = startJson.sessionId;

          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 1920 },
              height: { ideal: 1080 }
            },
            audio: false
          });
          cam.srcObject = stream;
          await cam.play();
          if (timer) clearInterval(timer);
          timer = setInterval(captureAndAnalyze, 1000);
          btnStop.disabled = false;
          setStatus('Recording… ~1 fps');
        } catch (err) {
          try {
            if (sessionId) {
              fetch('/api/cleanai/sessions/' + encodeURIComponent(sessionId) + '/stop', { method: 'POST' });
            }
          } catch (ignore) {}
          sessionId = null;
          btnStart.disabled = false;
          providerSel.disabled = false;
          setStatus((err.message || 'Camera error').slice(0, 140));
        }
      }

      function releaseCamera() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        if (stream) {
          stream.getTracks().forEach(function (t) {
            try {
              t.stop();
            } catch (e) {}
          });
          stream = null;
        }
        cam.srcObject = null;
        busy = false;
        clearOverlay();
        var c = liveView.getContext('2d');
        c.clearRect(0, 0, liveView.width, liveView.height);
      }

      function stop() {
        var sid = sessionId;
        sessionId = null;
        providerSel.disabled = false;
        btnStop.disabled = true;
        releaseCamera();
        btnStart.disabled = false;

        if (!sid) {
          setStatus('Stopped.');
          return;
        }

        setStatus('Saving… opening report…');
        fetch('/api/cleanai/sessions/' + encodeURIComponent(sid) + '/stop', { method: 'POST' })
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.error || 'Stop failed');
              return j;
            });
          })
          .then(function (data) {
            var url = data.reportUrl || '/cleanai/report/' + encodeURIComponent(sid);
            window.location.href = url;
          })
          .catch(function () {
            window.location.href = '/cleanai/report/' + encodeURIComponent(sid);
          });
      }

      btnStart.addEventListener('click', start);
      btnStop.addEventListener('click', stop);

      window.addEventListener('pagehide', function () {
        if (!sessionId) return;
        var sid = sessionId;
        try {
          fetch('/api/cleanai/sessions/' + encodeURIComponent(sid) + '/stop', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
            keepalive: true
          });
        } catch (e) {}
      });
    })();
  </script>
</body>
</html>
