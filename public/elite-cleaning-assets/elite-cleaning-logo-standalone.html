<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elite Cleaning Services — Animated Logo</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 50%, rgba(215, 173, 75, .08), transparent 26%),
        linear-gradient(180deg, #050505 0%, #020202 100%);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #f2d27b;
    }
    .logo-wrap {
      width: min(700px, 92vw);
      aspect-ratio: 1;
      display: grid;
      grid-template-areas: "stack";
      place-items: center;
      position: relative;
      filter: drop-shadow(0 36px 58px rgba(0, 0, 0, .66));
    }
    .logo-wrap > * { grid-area: stack; }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .logo-glow-canvas {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    .logo-wrap.is-animated img { visibility: hidden; }
    .downloads {
      margin-top: 28px;
      text-align: center;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .downloads a {
      color: #f2d27b;
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <div>
    <div class="logo-wrap">
      <img src="elite-cleaning-logo-dots-glow.png" alt="Elite Cleaning Services animated logo">
    </div>
    <p class="downloads">
      <a href="elite-cleaning-logo-animated.gif" download>Download GIF</a>
      <a href="elite-cleaning-logo-animated.webp" download>Download WebP</a>
    </p>
  </div>
  <script src="elite-cleaning-logo-animation.js"></script>
</body>
</html>
